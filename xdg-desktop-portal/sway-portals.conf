[preferred]
# Keep GTK for generic desktop portals and explicitly use wlroots for the
# interfaces that Sway supports well.
default=gtk
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.ScreenCast=wlr

# Avoid pulling in the Hyprland portal backend on Sway just because it also
# advertises this interface.
org.freedesktop.impl.portal.GlobalShortcuts=none
