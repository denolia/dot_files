# Migrated from the repo's previous Hyprland config.
# SwayFX restores some of the eye candy Sway lacks, so this keeps the
# Hyprland-like workflow while adding rounded corners, shadows, and blur on
# selected surfaces.

set $mod Mod4
set $terminal alacritty
set $fileManager nautilus
set $menu rofi -show drun

### Appearance ###

default_border pixel 2
default_floating_border pixel 2
gaps inner 8
gaps outer 12
smart_borders on
smart_gaps off

client.focused #ff7ad9 #ff7ad9 #fff7ff #74eaff #ff7ad9
client.focused_inactive #4e3470 #4e3470 #f3eaff #4e3470 #4e3470
client.unfocused #221335 #221335 #cbb8ea #221335 #221335
client.urgent #ff5d9e #ff5d9e #fff7ff #ff5d9e #ff5d9e
client.placeholder #140c22 #140c22 #e9dfff #140c22 #140c22

output * bg #090412 solid_color

corner_radius 8
smart_corner_radius enable

shadows enable
shadow_blur_radius 20
shadow_color #ff7ad966
shadow_inactive_color #7d6bff3d
shadow_offset 0 6

blur enable
blur_xray disable
blur_passes 3
blur_radius 4
blur_noise 0.02
blur_brightness 0.95
blur_contrast 0.95
blur_saturation 1.15

default_dim_inactive 0.20
dim_inactive_colors.unfocused #10081ccc
dim_inactive_colors.urgent #250012aa

layer_effects "waybar" {
    blur enable;
;     blur_xray enable;
    blur_ignore_transparent enable;
    shadows enable;
;     corner_radius 8;
}

layer_effects "rofi" {
    blur enable;
    blur_xray enable;
    blur_ignore_transparent enable;
    shadows enable;
    corner_radius 8;
}

### Input ###

focus_follows_mouse yes
mouse_warping none
floating_modifier $mod normal

# Hyprland exported XCURSOR_SIZE=24; in Sway the cursor size is configured via
# the seat. Adwaita is widely available and can be changed if you use another
# cursor theme globally.
seat seat0 xcursor_theme Adwaita 24

input type:keyboard {
    xkb_layout us,ru
    xkb_options grp:caps_toggle
}

input type:pointer {
    pointer_accel 0
}

input type:touchpad {
    natural_scroll disabled
}

### Startup ###

# Export the live Sway session environment so user services and D-Bus activated
# helpers like xdg-desktop-portal-gtk can see the Wayland display. Do not
# export DISPLAY from GDM/Xwayland into user services, otherwise GTK services
# may try X11 first and fail before Xwayland is actually usable.
exec_always --no-startup-id sh -c 'systemctl --user unset-environment DISPLAY; systemctl --user import-environment WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_TYPE; systemctl --user set-environment GDK_BACKEND=wayland'
exec_always --no-startup-id sh -c 'dbus-update-activation-environment --systemd WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP=sway XDG_SESSION_TYPE=wayland GDK_BACKEND=wayland'
exec_always --no-startup-id sh -c "systemctl --user reset-failed xdg-desktop-portal.service xdg-desktop-portal-gtk.service xdg-desktop-portal-wlr.service swaync.service; systemctl --user restart xdg-desktop-portal-gtk.service xdg-desktop-portal-wlr.service xdg-desktop-portal.service swaync.service"

exec --no-startup-id firefox
exec --no-startup-id $terminal
exec_always --no-startup-id sh -c 'pkill waybar 2>/dev/null; waybar'

### Keybindings ###

# Use keycodes for layout-independent shortcuts when switching between US/RU.
bindsym --to-code $mod+t exec $terminal
bindsym --to-code $mod+q kill
bindsym --to-code $mod+m exit
bindsym --to-code $mod+e exec $fileManager
bindsym --to-code $mod+v floating toggle
bindsym --to-code $mod+r exec $menu
bindsym --to-code $mod+p nop Hyprland pseudotile is not available in Sway
bindsym --to-code $mod+j layout toggle split

bindsym $mod+Left focus left
bindsym $mod+Right focus right
bindsym $mod+Up focus up
bindsym $mod+Down focus down

bindsym --to-code $mod+1 workspace number 1
bindsym --to-code $mod+2 workspace number 2
bindsym --to-code $mod+3 workspace number 3
bindsym --to-code $mod+4 workspace number 4
bindsym --to-code $mod+5 workspace number 5
bindsym --to-code $mod+6 workspace number 6
bindsym --to-code $mod+7 workspace number 7
bindsym --to-code $mod+8 workspace number 8
bindsym --to-code $mod+9 workspace number 9
bindsym --to-code $mod+0 workspace number 10

bindsym --to-code $mod+Shift+1 move container to workspace number 1
bindsym --to-code $mod+Shift+2 move container to workspace number 2
bindsym --to-code $mod+Shift+3 move container to workspace number 3
bindsym --to-code $mod+Shift+4 move container to workspace number 4
bindsym --to-code $mod+Shift+5 move container to workspace number 5
bindsym --to-code $mod+Shift+6 move container to workspace number 6
bindsym --to-code $mod+Shift+7 move container to workspace number 7
bindsym --to-code $mod+Shift+8 move container to workspace number 8
bindsym --to-code $mod+Shift+9 move container to workspace number 9
bindsym --to-code $mod+Shift+0 move container to workspace number 10

bindsym --to-code $mod+s scratchpad show
bindsym --to-code $mod+Shift+s move scratchpad

bindsym --whole-window $mod+button4 workspace prev_on_output
bindsym --whole-window $mod+button5 workspace next_on_output

bindsym XF86AudioRaiseVolume exec wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute exec wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindsym XF86MonBrightnessUp exec brightnessctl -e4 -n2 set 5%+
bindsym XF86MonBrightnessDown exec brightnessctl -e4 -n2 set 5%-

bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPause exec playerctl play-pause
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioPrev exec playerctl previous

bindsym F12 exec grim "$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"
bindsym Shift+F12 exec grim -g "$(slurp)" "$HOME/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png"
bindsym Ctrl+Shift+F12 exec grim -g "$(slurp)" - | wl-copy

### Window Rules ###

for_window [window_role="pop-up"] floating enable
for_window [window_role="bubble"] floating enable
for_window [window_role="task_dialog"] floating enable
for_window [window_type="dialog"] floating enable
for_window [window_type="menu"] floating enable
for_window [class="(?i)pinentry"] floating enable
